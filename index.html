<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <article class="profile-card">
        <img src="Rakan.jpg" alt="Akibul Alam Rakan"
        class="profile-avatar">       

        <h1 class="profile-name">Akibul Alam Rakan</h1>
        
        <p class="profile-bio">CSE Student | Frontend Developer | IELTS Instructor</p>

        <ul class="profile-stats">
            <li>1.8K followers</li>
            <li>254 following</li>
            <li>1.1K posts</li>
        </ul>

        <button class="follow-btn">Follow</button>

        <div class="social-links">
            <a href="https://www.facebook.com/akibul.rakan" target="_blank">
                <img src="facebook.png" alt="Facebook">
            </a>
            <a href="https://www.instagram.com/akibul.rakan" target="_blank">
                <img src="instagram.jpg" alt="Instagram">
            </a>
            <a href="https://github.com/akibulrakan" target="_blank">
                <img src="github.png" alt="GitHub">
            </a>
        </div>
    </article>

</body>
</html>
